<!doctype html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="/images/logo/logo.png">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Modal</title>
    <link rel="stylesheet" href="/css/video/video.css"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.9/dist/livekit-client.umd.js"></script>
    <script src="/js/video/service.js"></script>
    <script src="/js/video/layout.js"></script>
    <script src="/js/video/event.js"></script>
</head>
<body>
<main class="video-page">
    <section class="space-modal" aria-label="스페이스 모달">
        <header class="space-header">
            <!-- 녹음 시작, 정지 버튼 부분 -->
            <div class="header-actions">
                <!-- 기존 play-btn, stop-btn 제거하고 rec-btn으로 교체 -->
                <button class="rec-btn" type="button" aria-label="녹화">
                    <span class="rec-dot"></span>
                    <span class="rec-text">REC</span>
                </button>
                <button class="end-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M224 160C241.7 160 256 145.7 256 128C256 110.3 241.7 96 224 96L160 96C107 96 64 139 64 192L64 448C64 501 107 544 160 544L224 544C241.7 544 256 529.7 256 512C256 494.3 241.7 480 224 480L160 480C142.3 480 128 465.7 128 448L128 192C128 174.3 142.3 160 160 160L224 160zM566.6 342.6C579.1 330.1 579.1 309.8 566.6 297.3L438.6 169.3C426.1 156.8 405.8 156.8 393.3 169.3C380.8 181.8 380.8 202.1 393.3 214.6L466.7 288L256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L466.7 352L393.3 425.4C380.8 437.9 380.8 458.2 393.3 470.7C405.8 483.2 426.1 483.2 438.6 470.7L566.6 342.7z"/></svg>
                </button>
            </div>
        </header>

        <section class="space-body">
            <!-- 채팅방 바디 (화상통화 출력되는 곳) -->
            <div class="video-chat-session" id="layout-container">
                
            </div>
        </section>

        <footer class="space-footer">

            <div class="footer-right">
                <button class="circle-btn" type="button" aria-label="참여자">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="8" cy="9" r="3"/>
                        <circle cx="16" cy="9" r="3"/>
                        <path d="M3 20c0-3 2-5 5-5s5 2 5 5"/>
                        <path d="M11 20c0-3 2-5 5-5s5 2 5 5"/>
                    </svg>
                </button>
            </div>

            <div class="footer-right">
                <button id="summation" class="circle-btn" type="button" aria-label="녹화 목록">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M192 64C156.7 64 128 92.7 128 128L128 512C128 547.3 156.7 576 192 576L448 576C483.3 576 512 547.3 512 512L512 234.5C512 217.5 505.3 201.2 493.3 189.2L386.7 82.7C374.7 70.7 358.5 64 341.5 64L192 64zM453.5 240L360 240C346.7 240 336 229.3 336 216L336 122.5L453.5 240z"/></svg>
                </button>
            </div>
        </footer>
    </section>
    <div class="participant-panel off" id="participantPanel">
        <div class="participant-panel-header">
            <span class="participant-panel-title">참여자</span>
            <button class="participant-panel-close" id="participantPanelClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <ul class="participant-panel-list" id="participantList"></ul>
    </div>

    <div class="participant-panel off" id="recordingPanel">
        <div class="participant-panel-header">
            <span class="participant-panel-title">녹화된 파일 목록</span>
            <button class="participant-panel-close" id="recordingPanelClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <ul class="participant-panel-list" id="recordingList"></ul>
    </div>

    <!-- 요약 모달 -->
    <div class="summary-modal-backdrop" id="summaryBackdrop">
        <div class="summary-modal" id="summaryModal">
            <div class="summary-modal-header">
                <div class="summary-modal-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <span>회의 요약</span>
                </div>
                <button class="summary-modal-close" id="summaryModalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="summary-modal-body" id="summaryModalBody">
                <div class="summary-loading" id="summaryLoading">
                    <div class="summary-spinner"></div>
                    <span>요약 중...</span>
                </div>
                <div class="summary-content" id="summaryContent"></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
